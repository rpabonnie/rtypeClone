name: PR Author Policy

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]

permissions:
  pull-requests: write
  contents: read

jobs:
  validate-author:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR author is owner or collaborator
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const author = context.payload.pull_request.user.login;
            const repoOwner = context.payload.repository.owner.login;

            if (author === repoOwner) {
              core.info(`Author ${author} is repo owner. Allowed.`);
              return;
            }

            let isCollaborator = false;
            try {
              await github.rest.repos.checkCollaborator({ owner, repo, username: author });
              isCollaborator = true;
            } catch (error) {
              isCollaborator = false;
            }

            if (!isCollaborator) {
              core.setFailed(`PR author ${author} is not a collaborator or owner.`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.payload.pull_request.number,
                body: 'This repository only accepts PRs from the owner or collaborators.'
              });
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: context.payload.pull_request.number,
                state: 'closed'
              });
            }
